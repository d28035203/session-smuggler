apiVersion: apps/v1
kind: Deployment
metadata:
  name: session-smuggler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: session-smuggler
  template:
    metadata:
      labels:
        app: session-smuggler
    spec:
      containers:
        - name: session-smuggler
          image: d28035203/session-smuggler:latest
          ports:
            - containerPort: 8085
          env:
            - name: APP_HOST
              value: "0.0.0.0"
            - name: APP_PORT
              value: "8085"
            - name: TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: TOKEN_SECRET
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DBNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: POSTGRES_DBNAME
            - name: POSTGRES_HOST
              value: postgresdb
            - name: POSTGRES_PORT
              value: "5432"
---
apiVersion: v1
kind: Service
metadata:
  name: session-smuggler
spec:
  type: ClusterIP
  ports:
    - port: 8085
      targetPort: 8085
  selector:
    app: session-smuggler
